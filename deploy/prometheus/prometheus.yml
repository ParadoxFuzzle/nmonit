# Prometheus configuration for scraping the nmonit control-plane.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nmonit-control-plane"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "control-plane:8080"
        labels:
          service: "control-plane"
