version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/compute-nmonit/control-plane/gen
plugins:
  # Go: gRPC service stubs + message types
  - remote: buf.build/protocolbuffers/go
    out: ../control-plane/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: ../control-plane/gen
    opt:
      - paths=source_relative
  # Rust: code is generated via tonic-build in agent/build.rs, NOT via buf.
  # This is a deliberate design choice — tonic-build handles prost + tonic
  # codegen from the same .proto files.
  #
  # Code regeneration process:
  #   1. Run `make proto`  → regenerates Go code via buf
  #   2. Run `make agent`  → regenerates Rust code via tonic-build (build.rs)
  #
  # Both read from proto/compute/v1/*.proto (single source of truth).
