version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/compute-nmonit/proto
plugins:
  # Go: gRPC service stubs + message types
  - remote: buf.build/protocolbuffers/go
    out: ../control-plane/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: ../control-plane/gen
    opt:
      - paths=source_relative
  # Rust: code is generated via tonic-build in agent/build.rs
  # (buf remote plugins for Rust are not used — tonic-build
  #  handles prost + tonic codegen from the same .proto files)
