syntax = "proto3";

package compute.v1;

option go_package = "github.com/compute-nmonit/control-plane/gen/compute/v1;computev1";

import "compute/v1/resource.proto";

// AgentService is the gRPC API exposed by the control plane
// that node agents call into.
service AgentService {
  // Register on startup — agent advertises its hardware resources.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Bidirectional stream for heartbeat + resource updates.
  // Agent sends periodic heartbeats; control plane sends instructions.
  rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);

  // Control plane instructs agent to execute a task.
  rpc ExecuteTask(TaskSpec) returns (TaskAck);

  // Request distributed memory allocation on this node.
  rpc AllocateMemory(MemoryAllocRequest) returns (MemoryAllocResponse);

  // Request GPU memory allocation on this node.
  rpc AllocateGPUMemory(GPUMemoryAllocRequest) returns (GPUMemoryAllocResponse);

  // Free a previously allocated memory region.
  rpc FreeMemory(FreeMemoryRequest) returns (FreeMemoryResponse);

  // Free a previously allocated GPU memory region.
  rpc FreeGPUMemory(FreeGPUMemoryRequest) returns (FreeGPUMemoryResponse);
}

// --- Register ---

message RegisterRequest {
  string node_id = 1;               // Unique node identifier (hostname or UUID)
  string address = 2;                // IP:port where this agent listens
  NodeResources resources = 3;      // Hardware capabilities
  string agent_version = 4;         // Agent binary version
}

message RegisterResponse {
  bool accepted = 1;
  string cluster_id = 2;            // UUID of the cluster
  string control_plane_leader = 3;  // Address of Raft leader
  uint64 heartbeat_interval_ms = 4; // How often to send heartbeats
}

// --- Heartbeat ---

message HeartbeatRequest {
  string node_id = 1;
  uint64 sequence = 2;              // Monotonically increasing
  NodeUtilization utilization = 3;  // Current resource usage
  repeated TaskStatus tasks = 4;    // Status of tasks running on this node
}

message HeartbeatResponse {
  bool acknowledged = 1;
  uint64 sequence = 4;                     // Echo of the request sequence
  repeated PendingTask pending_tasks = 2;  // Tasks to start
  repeated string cancel_task_ids = 3;     // Tasks to kill
}

// --- Task Execution ---

message TaskSpec {
  string task_id = 1;
  string job_id = 2;
  string container_image = 3;       // OCI image reference
  repeated string command = 4;      // Entrypoint + args
  map<string, string> env = 5;      // Environment variables
  ResourceRequirements requirements = 6;
  // Memory regions this task should have access to
  repeated MemoryHandle memory_handles = 7;
  repeated GPUHandle gpu_handles = 8;
  int32 priority = 9;
}

message TaskAck {
  bool accepted = 1;
  string error = 2;                 // If rejected, why
}

message PendingTask {
  TaskSpec spec = 1;
}

message TaskStatus {
  string task_id = 1;
  TaskState state = 2;
  ResourceUtilization utilization = 3;
  int64 started_at_ns = 4;
  string error_message = 5;
}

enum TaskState {
  TASK_STATE_UNKNOWN = 0;
  TASK_STATE_PENDING = 1;
  TASK_STATE_RUNNING = 2;
  TASK_STATE_COMPLETED = 3;
  TASK_STATE_FAILED = 4;
  TASK_STATE_PREEMPTED = 5;
  TASK_STATE_CANCELLED = 6;
}

// --- Memory Allocation ---

message MemoryAllocRequest {
  string allocation_id = 1;
  uint64 size_bytes = 2;
  ConsistencyMode consistency = 3;
  bool use_hugepages = 4;
  int32 replication_factor = 5;     // How many nodes to replicate to
}

message ConsistencyMode {
  enum Mode {
    STRICT = 0;   // All nodes see writes immediately
    RELAXED = 1;  // Writes propagate eventually
    RELEASE = 2;  // Explicit flush barriers
  }
  Mode mode = 1;
}

message MemoryAllocResponse {
  bool success = 1;
  MemoryHandle handle = 2;
  string error = 3;
}

message MemoryHandle {
  string allocation_id = 1;
  string node_id = 2;
  uint64 remote_key = 3;    // RDMA remote key (rkey)
  uint64 address = 4;       // Virtual address in remote process
  uint64 size_bytes = 5;
}

message FreeMemoryRequest {
  string allocation_id = 1;
}

message FreeMemoryResponse {
  bool success = 1;
}

// --- GPU Memory Allocation ---

message GPUMemoryAllocRequest {
  string allocation_id = 1;
  uint64 size_bytes = 2;
  int32 gpu_device_index = 3;       // Which GPU on the node (-1 for any)
}

message GPUMemoryAllocResponse {
  bool success = 1;
  GPUHandle handle = 2;
  string error = 3;
}

message GPUHandle {
  string allocation_id = 1;
  string node_id = 2;
  int32 gpu_device_index = 3;
  uint64 gpu_address = 4;           // GPU virtual address
  uint64 size_bytes = 5;
  // For GPUDirect RDMA
  uint64 gpu_remote_key = 6;
}

message FreeGPUMemoryRequest {
  string allocation_id = 1;
}

message FreeGPUMemoryResponse {
  bool success = 1;
}
